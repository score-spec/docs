name: Compile Hugo

on:
  pull_request:
    branches: [ "*" ]
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - CODE_OF_CONDUCT.md

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      - run: npm install -g yarn
      - run: yarn install
      - run: yarn run hugo
      - run: yarn run dprint check
      - uses: score-spec/setup-score@1db79668fdd7b3e68ca5d5a734aad29ea75901cd # v3.2.3
        with:
          file: score-compose
          token: ${{ secrets.GITHUB_TOKEN }}
          version: 'latest'
      - run: |
          score-compose init --no-sample
          score-compose generate score.yaml --build main=.
      - run: |
          docker compose up --build -d
      - run: |
          curl $(score-compose resources get-outputs dns.default#score-docs.dns --format '{{ .host }}:8080/docs/')
