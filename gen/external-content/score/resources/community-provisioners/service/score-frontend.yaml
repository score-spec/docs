apiVersion: score.dev/v1b1
metadata:
  name: frontend
containers:
  my-container:
    image: busybox
    command: ["/bin/sh"]
    args: ["-c", "while true; do echo Hello $BACKEND_SVC!; sleep 5; done"]
    variables:
      BACKEND_SVC: ${resources.backend.url}/orders
resources:
  backend:
    type: service
    params:
      port: 8181
      artifacts: backend-openapi.yaml:true
      name: Order Service API
      version: 0.1.0